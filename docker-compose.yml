services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8088:80"
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      - frontend
      - auth-service
      - product-service
      - order-service
      - user-service
      - payment-service
      - notification-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    mem_limit: 64m

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    environment:
      ORDER_DB_HOST: ${ORDER_DB_HOST:-postgres}
      ORDER_DB_PORT: "5432"
      ORDER_DB_USER: ${ORDER_DB_USER:-app}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:-app}
      ORDER_DB_NAME: ${ORDER_DB_NAME:-shop}
      ORDER_DB_CONNECT_TIMEOUT: ${ORDER_DB_CONNECT_TIMEOUT:-3}
      PAYMENT_SERVICE_URL: http://payment-service:8005
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8006/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  alert-webhook:
    build:
      context: .
      dockerfile: services/alert-webhook/Dockerfile
    restart: unless-stopped
    mem_limit: 128m

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - alert-webhook
    restart: unless-stopped
    mem_limit: 128m

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - alertmanager
      - auth-service
      - product-service
      - order-service
      - user-service
      - payment-service
      - notification-service
      - cadvisor
    restart: unless-stopped
    mem_limit: 512m

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 512m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    mem_limit: 256m

volumes:
  pg_data:
