# User -> Frontend (Nginx) -> API Gateway -> microservices
# Public entry: api-gateway Service (LoadBalancer / NodePort)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shop-sre
  labels: { app: frontend, tier: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend, tier: frontend }
    spec:
      containers:
        - name: frontend
          image: shop/frontend:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          livenessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shop-sre
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shop-sre
  labels: { app: api-gateway, tier: gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway, tier: gateway }
    spec:
      containers:
        - name: api-gateway
          image: shop/api-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports: [{ containerPort: 80 }]
          livenessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shop-sre
  labels: { app: api-gateway }
spec:
  type: NodePort
  selector: { app: api-gateway }
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
