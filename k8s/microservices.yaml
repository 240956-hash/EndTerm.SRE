# 6 microservices: Auth | Product | Order | Payment | Notification | User Profile
# Each: Deployment (Pods) + Service + liveness/readiness (self-healing)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shop-sre
  labels: { app: auth-service, tier: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service, tier: backend }
    spec:
      containers:
        - name: auth-service
          image: shop/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8001 }]
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: shop-sre
spec:
  selector: { app: auth-service }
  ports: [{ port: 8001, targetPort: 8001 }]
