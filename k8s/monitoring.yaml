apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shop-sre
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: auth-service
        static_configs:
          - targets: ["auth-service:8001"]
        metrics_path: /metrics
      - job_name: product-service
        static_configs:
          - targets: ["product-service:8002"]
        metrics_path: /metrics
      - job_name: order-service
        static_configs:
          - targets: ["order-service:8003"]
        metrics_path: /metrics
      - job_name: payment-service
        static_configs:
          - targets: ["payment-service:8005"]
        metrics_path: /metrics
      - job_name: user-service
        static_configs:
          - targets: ["user-service:8004"]
        metrics_path: /metrics
      - job_name: notification-service
        static_configs:
          - targets: ["notification-service:8006"]
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shop-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          ports:
            - containerPort: 9090
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shop-sre
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: shop-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: shop-sre
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
